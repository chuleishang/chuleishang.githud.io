<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💘 一定要选我哦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #140b1c 0%, #2a1a3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* 动态爱心背景画布 */
        #heartsCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 中央卡片 */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(20, 10, 30, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 45px 35px 55px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1.5px rgba(255, 180, 200, 0.25) inset;
            text-align: center;
            border: 1px solid rgba(255, 200, 220, 0.2);
            max-width: 500px;
            width: 90%;
            animation: floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #fff0f5;
            text-shadow: 0 0 20px #ff6ea8, 0 0 40px #b54c7a;
            margin-bottom: 20px;
            letter-spacing: 6px;
            word-break: keep-all;
        }

        .heart-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px #ff88b2);
        }

        .button-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
            margin: 30px 0 15px;
        }

        .love-btn {
            border: none;
            border-radius: 60px;
            padding: 16px 0;
            font-size: 1.9rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.25), 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.28s cubic-bezier(0.25, 1, 0.5, 1);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            letter-spacing: 4px;
            border: 1px solid rgba(255,255,255,0.2);
            min-width: 150px;
            height: 72px;
            transform: scale(1);
            outline: none;
        }

        .love-btn:active {
            transform: translateY(5px);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2), 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        #agreeBtn {
            background: radial-gradient(circle at 30% 20%, #ff80ab, #e91e63);
            box-shadow: 0 8px 0 #a51144, 0 10px 25px #e91e6380;
        }

        #disagreeBtn {
            background: radial-gradient(circle at 30% 20%, #7b8da8, #3e4a5e);
            box-shadow: 0 8px 0 #242b36, 0 10px 20px #1e2530b3;
        }

        /* 同意后的成功提示 (初始隐藏) */
        .success-message {
            margin-top: 25px;
            font-size: 1.5rem;
            color: #ffe3aa;
            text-shadow: 0 0 10px #ffb86b;
            opacity: 0;
            transition: opacity 0.5s;
            font-weight: 500;
        }

        .hint {
            margin-top: 20px;
            color: #dbc7e6;
            opacity: 0.7;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        @media (max-width: 480px) {
            .card { padding: 35px 20px 45px; }
            h1 { font-size: 2.4rem; }
            .love-btn { font-size: 1.6rem; min-width: 130px; height: 64px; }
            .button-group { gap: 18px; }
        }
    </style>
</head>
<body>

    <canvas id="heartsCanvas"></canvas>

    <div class="card">
        <h1>
            <span class="heart-icon">❤️</span> 刘多文女士漂亮吗？ <span class="heart-icon">❤️</span>
        </h1>
        <div class="button-group">
            <button class="love-btn" id="agreeBtn">漂亮</button>
            <button class="love-btn" id="disagreeBtn">不漂亮</button>
        </div>
        <div class="success-message" id="successMsg">✨ 那太好了！现在可以离开啦 ✨</div>
        <div class="hint" id="hintText">不选漂亮是走不掉的哟 😉</div>
    </div>

    <script>
        (function(){
            "use strict";

            // ---------- 0. 退出拦截机制 ----------
            // 是否已经同意（解锁退出）
            let hasAgreed = false;

            // 拦截返回按钮 & 页面关闭提醒 (仅在未同意时生效)
            function preventExit() {
                // 向历史记录插入一个状态，使返回键不会直接退出
                history.pushState(null, '', location.href);
                window.addEventListener('popstate', function(e) {
                    if (!hasAgreed) {
                        // 未同意时，再次推入状态并弹出提醒
                        history.pushState(null, '', location.href);
                        alert('🚫 不能走哦～ 要先点击【同意】才能离开！');
                    } else {
                        // 同意后，允许返回（不再拦截）
                        // 但为了体验，我们可以在这里不做额外操作
                    }
                });

                // 页面关闭/刷新前的提醒（仅作提示，无法真正阻止）
                window.addEventListener('beforeunload', function(e) {
                    if (!hasAgreed) {
                        const msg = '你还没有选【同意】，确定要离开吗？';
                        e.returnValue = msg;  // 部分浏览器会显示
                        return msg;
                    }
                });
            }

            // 立即执行拦截初始化
            history.pushState(null, '', location.href);
            preventExit();

            // ---------- 1. 按钮交互 ----------
            const agreeBtn = document.getElementById('agreeBtn');
            const disagreeBtn = document.getElementById('disagreeBtn');
            const successMsg = document.getElementById('successMsg');
            const hintText = document.getElementById('hintText');

            // 尺寸变量
            let agreeWidth = 150;
            let agreeHeight = 72;
            let disagreeWidth = 150;
            let disagreeHeight = 72;

            function syncSizes() {
                const aStyle = window.getComputedStyle(agreeBtn);
                const dStyle = window.getComputedStyle(disagreeBtn);
                agreeWidth = parseFloat(aStyle.width);
                agreeHeight = parseFloat(aStyle.height);
                disagreeWidth = parseFloat(dStyle.width);
                disagreeHeight = parseFloat(dStyle.height);
            }
            syncSizes();

            // 同意按钮点击 —— 解锁并显示成功
            agreeBtn.addEventListener('click', function() {
                if (hasAgreed) return; // 防止重复触发

                hasAgreed = true;
                
                // 弹出提示
                alert('🎉 那太好了！ 🎉');
                
                // 显示成功消息，隐藏提示
                successMsg.style.opacity = '1';
                hintText.style.opacity = '0';
                
                // 按钮视觉效果
                agreeBtn.style.transform = 'scale(1.05)';
                agreeBtn.style.background = 'radial-gradient(circle at 30% 20%, #ffb0c8, #d81b60)';
                
                // 禁用不同意按钮
                disagreeBtn.style.pointerEvents = 'none';
                disagreeBtn.style.opacity = '0.5';
                disagreeBtn.style.filter = 'grayscale(0.6)';
                
                // 移除拦截逻辑：不再拦截popstate (但由于hasAgreed变为true，popstate中不再alert)
                // 同时移除beforeunload的干扰（但仍然会触发默认行为，我们可以忽略）
                
                // 可选：3秒后自动跳转到一个可爱页面（但为了不过度，保留在当前页，用户可自行关闭）
                // 如果想要自动关闭窗口（需脚本打开才行），这里只做提示
                setTimeout(() => {
                    // 微信内可提示
                    if (navigator.userAgent.includes('MicroMessenger')) {
                        // 微信里无法关闭，只提示
                    }
                }, 500);
            });

            // 不同意按钮点击 —— 变化大小 + 警告 + 维持拦截
            disagreeBtn.addEventListener('click', function() {
                if (hasAgreed) return;

                // 同意按钮变大
                agreeWidth += 28;
                agreeHeight += 16;
                agreeBtn.style.width = agreeWidth + 'px';
                agreeBtn.style.height = agreeHeight + 'px';
                const agreeFont = parseFloat(window.getComputedStyle(agreeBtn).fontSize);
                agreeBtn.style.fontSize = (agreeFont + 2.5) + 'px';

                // 不同意按钮变小
                disagreeWidth = Math.max(55, disagreeWidth - 12);
                disagreeHeight = Math.max(38, disagreeHeight - 7);
                disagreeBtn.style.width = disagreeWidth + 'px';
                disagreeBtn.style.height = disagreeHeight + 'px';
                const disFont = parseFloat(window.getComputedStyle(disagreeBtn).fontSize);
                disagreeBtn.style.fontSize = Math.max(13, disFont - 2) + 'px';

                // 附加震动效果
                disagreeBtn.style.transform = 'translateX(3px)';
                setTimeout(() => disagreeBtn.style.transform = '', 100);

                // 弹出警告框 —— 必须点掉才能继续
                alert('🚫 只有点击【同意】才能离开哟～');
                
                // 如果不同意按钮变得太小，更新提示文字
                if (disagreeWidth <= 70) {
                    hintText.innerText = '别挣扎啦，快选同意吧 😝';
                }

                // 再次确保拦截生效（push一个状态，防止连续返回）
                if (!hasAgreed) {
                    history.pushState(null, '', location.href);
                }
            });

            // 防止在点击不同意后通过手势返回，再加一层保险: 每当页面获得焦点时检查（对移动端返回有一定约束）
            window.addEventListener('pageshow', function() {
                if (!hasAgreed) {
                    history.pushState(null, '', location.href);
                }
            });

            // 触摸/点击其他地方不产生影响

            // ---------- 2. 动态爱心粒子 (维持氛围) ----------
            const canvas = document.getElementById('heartsCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            
            const HEART_SYMBOLS = ['❤️', '💖', '💗', '💓', '💕', '💘', '🌸', '✨', '🌟'];
            
            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 26 + 12;
                    this.speedY = Math.random() * 0.45 + 0.15;
                    this.speedX = Math.random() * 0.2 - 0.1;
                    this.waveOffset = Math.random() * 100;
                    this.symbol = HEART_SYMBOLS[Math.floor(Math.random() * HEART_SYMBOLS.length)];
                    this.opacity = 0.3 + Math.random() * 0.5;
                }
                update() {
                    this.y -= this.speedY;
                    this.x += Math.sin(Date.now() * 0.002 + this.waveOffset) * 0.12 + this.speedX;
                    if (this.y < -60 || this.x < -60 || this.x > width + 60) {
                        this.reset();
                        this.y = height + 40;
                        this.x = Math.random() * width;
                    }
                    this.opacity = 0.35 + 0.35 * Math.sin(Date.now() * 0.003 + this.waveOffset);
                }
                draw() {
                    ctx.save();
                    ctx.font = `${this.size}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = '#ffa0c0';
                    ctx.shadowBlur = 18;
                    ctx.globalAlpha = this.opacity * 0.9;
                    ctx.translate(this.x, this.y);
                    ctx.rotate(Math.sin(Date.now() * 0.001 + this.waveOffset) * 0.05);
                    ctx.fillText(this.symbol, 0, 0);
                    ctx.restore();
                }
            }

            function initCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                const targetCount = Math.min(90, Math.max(50, Math.floor((width * height) / 10000)));
                if (particles.length < targetCount) {
                    for (let i = particles.length; i < targetCount; i++) particles.push(new Particle());
                } else {
                    particles = particles.slice(0, targetCount);
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', initCanvas);
            initCanvas();
            animate();
            
            // 确保初始化时按钮尺寸正确
            window.addEventListener('load', syncSizes);
        })();
    </script>
</body>
</html>
